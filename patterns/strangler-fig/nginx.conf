# Nginx Configuration untuk Strangler Fig Pattern
# File ini menunjukkan bagaimana routing requests ke legacy vs new services

events {
    worker_connections 1024;
}

http {
    # Upstream definitions
    upstream legacy {
        server legacy-monolith:8080;
    }

    upstream users_service {
        server users-service:8081;
    }

    upstream orders_service {
        server orders-service:8082;
    }

    # Logging
    log_format migration '$remote_addr - $remote_user [$time_local] '
                        '"$request" $status $body_bytes_sent '
                        '"$http_referer" "$http_user_agent" '
                        'upstream: $upstream_addr';

    access_log /var/log/nginx/access.log migration;

    server {
        listen 80;
        server_name _;

        # Health check endpoint
        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }

        # Users API - Route ke new service
        location /api/v2/users {
            proxy_pass http://users_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Timeouts
            proxy_connect_timeout 5s;
            proxy_send_timeout 10s;
            proxy_read_timeout 10s;
        }

        # Orders API - Route ke new service
        location /api/v2/orders {
            proxy_pass http://orders_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Legacy API v1 - Masih ke legacy
        location /api/v1/ {
            proxy_pass http://legacy;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Default - Route ke legacy untuk backward compatibility
        location / {
            proxy_pass http://legacy;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Metrics endpoint untuk monitoring
        location /metrics {
            proxy_pass http://users_service/metrics;
        }
    }
}
